<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Techvrs</title>
  <link rel="icon" type="image/png" href="https://iili.io/CCrVg5B.png" />
  <link rel="apple-touch-icon" href="https://iili.io/CCrVg5B.png" />
  <meta name="theme-color" content="#0A1128" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .notfound { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; }
    .notfound-inner { max-width: 480px; }
    .notfound-code { font-family: var(--mono); font-size: 6rem; font-weight: 700; color: var(--border); line-height: 1; margin-bottom: 16px; }
    .notfound-title { font-family: var(--serif); font-size: 2rem; color: var(--espresso); margin-bottom: 12px; }
    .notfound-desc { color: var(--muted); margin-bottom: 32px; }
  </style>
</head>
<body>
<div class="notfound">
  <div class="notfound-inner">
    <div class="notfound-code">404</div>
    <h1 class="notfound-title serif">Page Not Found</h1>
    <p class="notfound-desc">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn btn-primary"><i class="fas fa-house"></i> Back to Home</a>
  </div>
</div>
</body>
</html>
